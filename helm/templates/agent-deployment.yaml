# One Deployment per agent defined in .Values.storeagent.agents.
# Each pod is pinned to a specific cluster node via nodeSelector (kubernetes.io/hostname)
# and mounts hostPath volumes for direct filesystem access. The checksum/config annotation
# ensures pods are rolled whenever the agent's ConfigMap changes.
{{- range .Values.storeagent.agents }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels:
    app: storeagent
    agent: {{ .name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storeagent
      agent: {{ .name }}
  template:
    metadata:
      labels:
        app: storeagent
        agent: {{ .name }}
      annotations:
        checksum/config: {{ .config | toJson | sha256sum }}
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .hostname }}
      containers:
        - name: storeagent
          image: "{{ $.Values.image.repository }}/{{ $.Values.storeagent.image.name }}:{{ $.Values.storeagent.image.tag }}"
          ports:
            - containerPort: {{ .config.bind_port }}
              name: http
          volumeMounts:
            - name: config
              mountPath: /opt/storeagent/config.json
              subPath: config.json
            {{- range .hostPaths }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .name }}-config
        {{- range .hostPaths }}
        - name: {{ .name }}
          hostPath:
            path: {{ .hostPath }}
            type: Directory
        {{- end }}
{{- end }}
