# One ClusterIP Service per agent. The Service name becomes the agent's cluster_url
# (resolved as <name>.<namespace>.svc.cluster.local inside the cluster).
{{- range .Values.storeagent.agents }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  labels:
    app: storeagent
    agent: {{ .name }}
spec:
  type: ClusterIP
  selector:
    app: storeagent
    agent: {{ .name }}
  ports:
    - port: {{ .config.bind_port }}
      targetPort: http
      name: http
{{- end }}
