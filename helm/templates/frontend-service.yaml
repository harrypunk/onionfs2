# Frontend ClusterIP Service + Envoy Gateway HTTPRoute.
# The service port is internal and fixed to match the containerPort in the Deployment.
{{- if .Values.frontend }}
{{- $port := 3000 -}}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: onionfs-frontend
spec:
  type: ClusterIP
  selector:
    app: onionfs-frontend
  ports:
    - port: {{ $port }}
      targetPort: http
      name: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  labels:
    app: onionfs-frontend
spec:
  parentRefs:
    - name: {{ .Values.frontend.httproute.gatewayName }}
      namespace: {{ .Values.frontend.httproute.gatewayNamespace }}
  hostnames:
    {{- range .Values.frontend.httproute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.frontend.httproute.path | default "/" }}
      backendRefs:
        - name: frontend
          port: {{ $port }}
{{- end }}
