# Envoy Gateway HTTPRoute that exposes the frontend UI externally.
# Adjust .Values.frontend.httproute.gatewayName / gatewayNamespace to match your
# Envoy Gateway installation (default: eg / envoy-gateway-system).
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  labels:
    app: onionfs-frontend
spec:
  parentRefs:
    - name: {{ .Values.frontend.httproute.gatewayName }}
      namespace: {{ .Values.frontend.httproute.gatewayNamespace }}
  hostnames:
    {{- range .Values.frontend.httproute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.frontend.httproute.path | default "/" }}
      backendRefs:
        - name: frontend
          port: {{ .Values.frontend.service.port | default 3000 }}
